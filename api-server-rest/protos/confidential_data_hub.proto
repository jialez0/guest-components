syntax = "proto3";

package api;

message GetResourceRequest {
    string ResourcePath = 1;
}

message GetResourceResponse {
    bytes Resource = 1;
}

message PrepareResourceInjectionRequest {
    string ResourcePath = 1;
    string Nonce = 2;
}

message PrepareResourceInjectionResponse {
    string SessionId = 1;
    string Nonce = 2;
    string TeePubKey = 3;
    bytes Evidence = 4;
}

message CommitResourceInjectionRequest {
    string SessionId = 1;
    string ResourcePath = 2;
    bytes EncryptedResource = 3;
}

message CommitResourceInjectionResponse {}

service GetResourceService {
    rpc GetResource(GetResourceRequest) returns (GetResourceResponse) {};
    rpc PrepareResourceInjection(PrepareResourceInjectionRequest) returns (PrepareResourceInjectionResponse) {};
    rpc CommitResourceInjection(CommitResourceInjectionRequest) returns (CommitResourceInjectionResponse) {};
}
