name: Build RPM Package

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

jobs:
  create-tarball:
    runs-on: ubuntu-latest
    outputs:
      PRE_RELEASE: ${{ steps.check-pre-release.outputs.PRE_RELEASE }}
      VERSION: ${{ steps.extract-version.outputs.VERSION }}
      RELEASE: ${{ steps.extract-version.outputs.RELEASE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Check pre-release
        id: check-pre-release
        run: |
          tag="${GITHUB_REF#refs/*/}"
          echo "tag=$tag"
          if [[ ${tag} == *alpha* || ${tag} == *beta* ]]
          then
              prerelease=true
          else
              prerelease=false
          fi
          echo "prerelease=$prerelease"
          echo "PRE_RELEASE=$prerelease" >> $GITHUB_OUTPUT

      - name: Extract version info
        id: extract-version
        run: |
          VERSION=$(grep -m1 '^Version:' trustiflux.spec | awk '{print $2}')
          RELEASE=$(grep -m1 '^%define release' trustiflux.spec | awk '{print $3}')
          echo "Using VERSION: $VERSION"
          echo "Using RELEASE: $RELEASE"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "RELEASE=$RELEASE" >> $GITHUB_OUTPUT

      - uses: dtolnay/rust-toolchain@1.75.0

      - name: Create tarball
        run: make create-tarball

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          if-no-files-found: error
          path: |
            /tmp/v*.tar.gz
            /tmp/guest-components-*-vendor.tar.gz

  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]
        distro: [an23, al8]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - distro: an23
            buildspec_template: dist/buildspec/trustiflux.an23.buildspec.yaml.template
            dist_suffix: an23
          - distro: al8
            buildspec_template: dist/buildspec/trustiflux.al8.buildspec.yaml.template
            dist_suffix: al8
    runs-on: ${{ matrix.runner }}
    needs: create-tarball
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: ./

      - name: Prepare buildspec and export version info
        id: prepare-buildspec
        run: |
          GITHUB_RELEASE="${{ github.ref_name || 'no_tag' }}"
          GITHUB_REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          VERSION="${{ needs.create-tarball.outputs.VERSION }}"
          RELEASE="${{ needs.create-tarball.outputs.RELEASE }}"
          DIST_SUFFIX="${{ matrix.dist_suffix }}"

          echo "Using GITHUB_RELEASE: $GITHUB_RELEASE"
          echo "Using VERSION: $VERSION"
          echo "Using RELEASE: $RELEASE"
          echo "Using DIST_SUFFIX: $DIST_SUFFIX"

          # Create buildspec for release
          export GITHUB_RELEASE GITHUB_REPO_URL VERSION RELEASE
          envsubst '$GITHUB_RELEASE $GITHUB_REPO_URL $VERSION $RELEASE' \
            < ${{ matrix.buildspec_template }} \
            > ./trustiflux-${VERSION}-${RELEASE}.${DIST_SUFFIX}.${{ matrix.arch }}.buildspec.yaml

          # Copy buildspec for local build
          # Install yq
          YQ_ARCH=${{ matrix.arch == 'aarch64' && 'arm64' || 'amd64' }}
          YQ_VERSION="v4.45.1"
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_${YQ_ARCH}
          sudo chmod +x /usr/local/bin/yq

          LOCAL_BUILDSPEC="dist/buildspec/trustiflux.${DIST_SUFFIX}.buildspec.yaml"
          cp ./trustiflux-${VERSION}-${RELEASE}.${DIST_SUFFIX}.${{ matrix.arch }}.buildspec.yaml "${LOCAL_BUILDSPEC}"

          # Replace URL with local path for local build
          yq -i ".inputs.source.url = \"file://${GITHUB_WORKSPACE}/v${VERSION}.tar.gz\"" "${LOCAL_BUILDSPEC}"
          yq -i ".inputs.rustVendor.url = \"file://${GITHUB_WORKSPACE}/guest-components-v${VERSION}-vendor.tar.gz\"" "${LOCAL_BUILDSPEC}"

      - name: Upload build input artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-input-${{ matrix.distro }}-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            ./v*.tar.gz
            ./guest-components-*-vendor.tar.gz
            ./trustiflux-*.${{ matrix.dist_suffix }}.${{ matrix.arch }}.buildspec.yaml

      - name: Build RPM package
        uses: 1570005763/GuanFu@v1
        with:
          spec_path: dist/buildspec/trustiflux.${{ matrix.dist_suffix }}.buildspec.yaml

      - name: Upload build output artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.distro }}-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            /tmp/rpmbuild/SRPMS/trustiflux-*.${{ matrix.dist_suffix }}.src.rpm
            /tmp/rpmbuild/RPMS/${{ matrix.arch }}/attestation-agent-*.${{ matrix.dist_suffix }}.${{ matrix.arch }}.rpm
            /tmp/rpmbuild/RPMS/${{ matrix.arch }}/confidential-data-hub-*.${{ matrix.dist_suffix }}.${{ matrix.arch }}.rpm
            /tmp/rpmbuild/RPMS/${{ matrix.arch }}/trustiflux-api-server-*.${{ matrix.dist_suffix }}.${{ matrix.arch }}.rpm

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: an23
            distro_image: "registry.openanolis.cn/openanolis/anolisos:23"
            arch: x86_64
            runner: ubuntu-latest
            extra_repos: "yum install -y anolis-epao-release"
          - distro: al8
            distro_image: "alibaba-cloud-linux-3-registry.cn-hangzhou.cr.aliyuncs.com/alinux3/alinux3:latest"
            arch: x86_64
            runner: ubuntu-latest
            extra_repos: ""
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    needs: build
    container:
      image: ${{ matrix.distro_image }}
      volumes:
        - /run/udev/control:/run/udev/control
        - /dev:/dev
      options: --privileged --ipc=host
    steps:
      - name: Install dependencies
        run: |
          set -e
          set -x

          # Speed up package installation
          sed -i -E 's|https?://mirrors.openanolis.cn/anolis/|https://mirrors.aliyun.com/anolis/|g' /etc/yum.repos.d/*.repo
          sed -i -E 's|https?://mirrors.cloud.aliyuncs.com/|https://mirrors.aliyun.com/|g' /etc/yum.repos.d/*.repo
          sed -i 's/^max_parallel_downloads=.*/max_parallel_downloads=20/' /etc/yum.conf
          if ! grep -q "^max_parallel_downloads=" /etc/yum.conf; then
            sed -i '/^\[main\]$/a max_parallel_downloads=20' /etc/yum.conf
          fi

          # update packages
          yum update -y
          ${{ matrix.extra_repos }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ matrix.distro }}-${{ matrix.arch }}
          path: ./rpm-packages/

      - name: Install RPM packages
        run: |
          set -e
          set -x

          # test rpm package install
          yum install -y $(find ./rpm-packages/RPMS -maxdepth 2 -name '*.rpm' | grep -v '\.src\.rpm$')
          attestation-agent --version
          confidential-data-hub --version
          trustiflux-api-server --version

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - create-tarball
      - build
      - test
    strategy:
      # Serialize to avoid GitHub Release race conditions
      max-parallel: 1
      matrix:
        include:
          - distro: an23
            arch: x86_64
          - distro: al8
            arch: x86_64
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: 1570005763/GuanFu/.github/workflows/release.yml@v1
    with:
      input_artifact: build-input-${{ matrix.distro }}-${{ matrix.arch }}
      output_artifact: build-output-${{ matrix.distro }}-${{ matrix.arch }}
      release_slsa_provenance: true
      provenance_name: "trustiflux-${{ needs.create-tarball.outputs.VERSION }}-${{ needs.create-tarball.outputs.RELEASE }}.${{ matrix.distro }}.${{ matrix.arch }}.intoto.jsonl"
      rpm_detail_provenance: true
      upload_provenance_to_rekor: true
      release_tag_name: "${{ github.ref_name }}"
      prerelease: ${{ needs.create-tarball.outputs.PRE_RELEASE == 'true' }}

  notify-rvds:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./

      - name: Notify RVDS of release
        if: env.RVDS_ENDPOINT != ''
        env:
          RVDS_ENDPOINT: ${{ env.RVDS_ENDPOINT }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: bash .github/scripts/notify_rvds_release.sh
